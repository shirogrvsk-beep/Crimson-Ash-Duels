name: CrimsonAshDuels
version: 1.0.0
main: com.crimsonashduels.CrimsonAshDuels
api-version: 1.21
author: DaxterKidPH
description: A dueling plugin inspired by DonutDuels
commands:
  duel:
    description: Challenge another player to a duel
    usage: /duel <player>
  duelaccept:
    description: Accept a pending duel
    usage: /duelaccept [arena]
  spectate:
    description: Spectate a duel
    usage: /spectate <player>
  queue:
    description: Join or leave the duel queue
    usage: /queue <join|leave>
  stats:
    description: View your duel stats
    usage: /stats
  topwins:
    description: View the top players by wins
    usage: /topwins
  topduels:
    description: View the top players by duels played
    usage: /topduels

