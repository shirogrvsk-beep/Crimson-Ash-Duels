name: CrimsonAshDuels
version: 1.0.0
main: com.crimsonashduels.CrimsonAshDuels
api-version: 1.21
author: DaxterKidPH
description: A dueling plugin inspired by DonutDuels
commands:
  duel:
    description: Challenge another player to a duel (opens kit selector GUI)
    usage: /duel <player>
  duelaccept:
    description: Accept a pending duel
    usage: /duelaccept [arena]
  spectate:
    description: Spectate a duel
    usage: /spectate <player>
  queue:
    description: Join or leave the duel queue
    usage: /queue <join|leave>
  stats:
    description: View your duel stats
    usage: /stats
  topwins:
    description: View the top players by wins
    usage: /topwins
  topduels:
    description: View the top players by duels played
    usage: /topduels
  topwinsgui:
    description: Open GUI leaderboard for wins
    usage: /topwinsgui
  topduelsgui:
    description: Open GUI leaderboard for duels
    usage: /topduelsgui
  elo:
    description: View your current ELO rating
    usage: /elo
  topelo:
    description: View the top players by ELO rating
    usage: /topelo
  topelogui:
    description: Open GUI leaderboard for ELO
    usage: /topelogui
  resetseason:
    description: Reset all stats and ELO for a new season
    usage: /resetseason
    permission: crimsonashduels.admin
  savearena:
    description: Save an arena schematic
    usage: /savearena <name>
    permission: crimsonashduels.admin
  restorearena:
    description: Restore an arena schematic
    usage: /restorearena <name>
    permission: crimsonashduels.admin
  rotatearenas:
    description: Manually trigger arena rotation and reset
    usage: /rotatearenas
    permission: crimsonashduels.admin
  crimson:
    description: Root command for CrimsonAshDuels admin tools (kits)
    usage: /crimson kit <create|editor> <name>
    permission: crimsonashduels.admin
