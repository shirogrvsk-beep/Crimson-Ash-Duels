# CrimsonAshDuels Configuration
# Generated automatically on first run. Customize as needed.

# Cooldown (in seconds) between sending duel requests
duel-request-cooldown: 30

# Interval (in minutes) for automatic arena rotation/reset
arena-rotation-interval-minutes: 60

# Arena definitions
arenas:
  arena1:
    world: world
    corner1: 100,64,100
    corner2: 120,80,120
    pasteLocation: 110,65,110
  arena2:
    world: world_nether
    corner1: -50,64,-50
    corner2: -30,80,-30
    pasteLocation: -40,65,-40
  arena3:
    world: world_the_end
    corner1: 200,70,200
    corner2: 220,85,220
    pasteLocation: 210,72,210

# Stats/ELO settings
elo:
  default: 1000
  win_increment: 25
  loss_decrement: 15

# Spectator settings
spectator:
  allowSpectators: true
  teleportOnJoin: true

# Queue system
queue:
  enabled: true
  maxPlayers: 100
