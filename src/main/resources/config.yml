# CrimsonAshDuels Configuration

# Interval in minutes for automatic arena rotation/reset
# Example: 60 = every hour, 1440 = once per day
arena-rotation-interval-minutes: 60

# Rotation mode for arenas
# Options: sequential, random
rotation-mode: sequential

# Default cooldown (seconds) between duel requests
duel-request-cooldown: 30

# Arenas configuration
# Each arena must define:
# - world: The world name
# - spawn1: First player spawn location (x,y,z)
# - spawn2: Second player spawn location (x,y,z)
# - pasteLocation: Where the schematic should be pasted/reset
arenas:
  default:
    world: Crimson
    spawn1:
      x: 100
      y: 65
      z: 100
    spawn2:
      x: 110
      y: 65
      z: 100
    pasteLocation:
      x: 100
      y: 65
      z: 100

  secondarena:
    world: Crimson
    spawn1:
      x: 200
      y: 70
      z: 200
    spawn2:
      x: 210
      y: 70
      z: 200
    pasteLocation:
      x: 200
      y: 70
      z: 200

# ELO system defaults
elo:
  default: 1000
  k-factor: 32

# Messages customization
messages:
  duel-request: "&eYou have challenged &b{player} &eto a duel!"
  duel-accepted: "&a{player} accepted your duel request!"
  duel-denied: "&c{player} denied your duel request."
  duel-win: "&aYou won the duel against &b{player}&a!"
  duel-loss: "&cYou lost the duel against &b{player}&c!"
  arena-reset: "&6Arena {arena} has been reset."
